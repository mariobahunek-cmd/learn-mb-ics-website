# learn.mb-ics.com — MB-ICS Academy (Endanwender) · Jekyll-Konfiguration
# Eigenständige GitHub-Pages-Site, getrennt vom B2B-Schaufenster mb-ics.com.
# Zweck: dünne Marketing-/Autoritäts-Schicht — Endanwender-Erklärinhalte, die
# in (a) E-Mail-Leads und (b) Anfragen für SAP-Training/Beratung münden.
# KEIN Video-/Produkt-Shop.
#
# Konvention analog mb-ics.com: Jekyll 3 (GitHub-Pages-Default), kramdown,
# jekyll-seo-tag + jekyll-feed, KEIN jekyll-sitemap (eigenes sitemap.xml-Template).

title: "MB-ICS Academy — SAP für Anwender verständlich erklärt"
description: "SAP für Anwender verständlich erklärt: Einkauf, Bestand, Rechnungsprüfung und mehr — ohne Fachchinesisch. Kostenlose Erklärartikel von einem SAP-zertifizierten Berater (MM/SD) und Trainer."
url: "https://learn.mb-ics.com"
author: "Mario Bahunek"
email: "mario@mb-ics.com"
lang: "en"

# ── Site-eigene Variablen ─────────────────────────────────────────────
# Kontakt-/Trainings-Anfragen laufen bewusst auf mb-ics.com (B2B-Schaufenster).
mbics_contact: "https://mb-ics.com/#contact"
mbics_home: "https://mb-ics.com/"
linkedin: "https://www.linkedin.com/in/mariobahunek/"
# E-Mail-Capture: Aktuell die bestehende Formspree-Form (leads landen in Marios
# Inbox, filterbar über source/form_type). TODO: sobald eine Brevo-Double-Opt-In-
# Liste steht, hier die Brevo-Form-Action (BREVO_FORM_URL) eintragen und
# _includes/email-capture.html-Kommentar folgen.
lead_endpoint: "https://formspree.io/f/xykdwnbk"
# Analytics: cookieloses Plausible (Script in _includes/tracking-head.html) —
# kein GA4, kein Consent-Banner nötig.

# ── Build-Settings ────────────────────────────────────────────────────
markdown: kramdown
highlighter: rouge
theme: null
plugins:
  - jekyll-seo-tag
  - jekyll-feed
# jekyll-sitemap bewusst NICHT — /sitemap.xml wird selbst per Liquid-Template
# generiert (damit auch die statischen Landing-/Blog-Listing-URLs drin sind).

# Permalink-Fallback. Jekyll 3 kennt keine :lang-Variable — jeder Post setzt
# seinen Permalink explizit im Frontmatter: /blog/de|en/<slug>/
permalink: /blog/:slug/

# Defaults — nur _posts/ bekommen ein Layout; alle anderen Files unverändert.
defaults:
  - scope:
      path: "_posts"
      type: "posts"
    values:
      layout: "post"
      author: "Mario Bahunek"
  - scope:
      path: ""
    values:
      layout: null

# Excludes — Drafts/Doku werden nicht publiziert. Kein bare "*.md" (würde
# _posts/*.md mitfiltern).
exclude:
  - _drafts/
  - Gemfile
  - Gemfile.lock
  - vendor/
  - README.md
  - .gitignore
  - .github/
  - node_modules/

sass:
  style: compressed
