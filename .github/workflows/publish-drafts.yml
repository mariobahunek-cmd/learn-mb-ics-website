name: Publish Blog Draft (manual only)

# REVIEW-GATE: Academy-Blog-Posts gehen NICHT automatisch live.
# Dieser Workflow hat BEWUSST KEINEN `schedule:`-Trigger (anders als das
# mb-ics-Pendant) — es gibt also KEIN 2x/Woche-Auto-Publish. Er läuft NUR
# per `workflow_dispatch`, d.h. wenn Mario einen Draft in Mission Control
# (mc.sapprep.de/blog-approval) freigibt (die MC-Approve-Aktion feuert den
# Dispatch) — oder Mario ihn manuell auf der Actions-Seite startet.
#
# Was er tut: verschiebt den ÄLTESTEN Draft (samt translation_key-Pärling)
# aus _drafts/ nach _posts/, synct das Datum im Filename auf heute, injiziert
# den Permalink falls fehlend, committet + pusht. GitHub Pages baut danach.
#
# Bis ein Draft so freigegeben wird, liegt er in _drafts/ und wird vom
# Jekyll-Build IGNORIERT (kein --drafts-Flag, zusätzlich in _config.yml
# exclude) → er ist NICHT öffentlich sichtbar.

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry-Run (nur loggen, nicht committen)'
        required: false
        default: 'false'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Find oldest draft and move (incl. translation pair)
        id: move
        env:
          DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: |
          set -euo pipefail

          if [ ! -d "_drafts" ]; then
            echo "Keine _drafts/ Mappe vorhanden — nichts zu tun."
            echo "moved=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          mapfile -t drafts < <(find _drafts -maxdepth 1 -type f \( -name '*.md' -o -name '*.markdown' \) | sort)

          if [ ${#drafts[@]} -eq 0 ]; then
            echo "Keine Drafts vorhanden — nichts zu tun."
            echo "moved=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          oldest="${drafts[0]}"
          echo "Ältester Draft: $oldest"

          tkey=$(awk '
            /^---/ { if (++sep == 2) exit; next }
            sep == 1 && /^translation_key:/ {
              sub(/^translation_key:[[:space:]]*"?/, "")
              sub(/"?[[:space:]]*$/, "")
              print
              exit
            }
          ' "$oldest")

          candidates=("$oldest")
          if [ -n "$tkey" ]; then
            echo "translation_key gefunden: $tkey"
            for d in "${drafts[@]}"; do
              [ "$d" = "$oldest" ] && continue
              other_key=$(awk '
                /^---/ { if (++sep == 2) exit; next }
                sep == 1 && $0 ~ "^translation_key:" {
                  sub(/^translation_key:[[:space:]]*"?/, "")
                  sub(/"?[[:space:]]*$/, "")
                  print
                  exit
                }
              ' "$d")
              if [ "$other_key" = "$tkey" ]; then
                candidates+=("$d")
              fi
            done
          else
            echo "Kein translation_key — nur der einzelne Draft wird gemoved."
          fi

          today=$(date -u +'%Y-%m-%d')
          moved_files=()

          for src in "${candidates[@]}"; do
            base=$(basename "$src")
            stripped=$(echo "$base" | sed -E 's/^[0-9]{4}-[0-9]{2}-[0-9]{2}-//')
            new_name="${today}-${stripped}"
            dest="_posts/${new_name}"

            mkdir -p _posts
            if [ "${DRY_RUN}" = "true" ]; then
              echo "[DRY-RUN] $src → $dest"
            else
              git mv "$src" "$dest"
              sed -i -E "s/^date:[[:space:]]*[0-9]{4}-[0-9]{2}-[0-9]{2}.*$/date: ${today}/" "$dest"

              if ! grep -q "^permalink:" "$dest"; then
                lang=$(awk '/^lang:/ {gsub(/^lang:[[:space:]]*"?|"?[[:space:]]*$/,""); print; exit}' "$dest")
                slug=$(awk '/^slug:/ {gsub(/^slug:[[:space:]]*"?|"?[[:space:]]*$/,""); print; exit}' "$dest")
                if [ -n "$lang" ] && [ -n "$slug" ]; then
                  sed -i "/^slug:/a permalink: /blog/${lang}/${slug}/" "$dest"
                  echo "  → injected permalink /blog/${lang}/${slug}/"
                else
                  echo "  ⚠ Permalink nicht injiziert (lang oder slug fehlt im Frontmatter)" >&2
                fi
              fi

              git add "$dest"
              echo "Moved: $src → $dest (date synced to ${today})"
            fi
            moved_files+=("$dest")
          done

          {
            echo "moved=true"
            echo "moved_count=${#moved_files[@]}"
            printf 'moved_list<<EOF\n%s\nEOF\n' "$(printf '%s\n' "${moved_files[@]}")"
          } >> "$GITHUB_OUTPUT"

      - name: Commit and push
        if: steps.move.outputs.moved == 'true' && github.event.inputs.dry_run != 'true'
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --cached --quiet; then
            echo "Keine staged Änderungen — überspringe Commit."
            exit 0
          fi

          msg="chore(blog): publish ${{ steps.move.outputs.moved_count }} approved draft(s) on $(date -u +'%Y-%m-%d')"
          git commit -m "$msg"
          git push origin HEAD:${{ github.ref_name }}

      - name: Summary
        if: always()
        run: |
          echo "## Publish Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ steps.move.outputs.moved }}" = "true" ]; then
            echo "**Moved (${{ steps.move.outputs.moved_count }}):**" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo "${{ steps.move.outputs.moved_list }}" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Keine Drafts gefunden — nichts gemoved." >> "$GITHUB_STEP_SUMMARY"
          fi
