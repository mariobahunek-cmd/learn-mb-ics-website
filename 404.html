<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Page not found · SAP Academy</title>
    <meta name="robots" content="noindex, follow">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="/academy.css">
    <style>
        .err {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
            background:
                radial-gradient(circle at 25% 20%, rgba(0,112,242,0.06), transparent 60%),
                var(--gray-50);
        }
        .err__code { font-family: var(--font-display); font-size: clamp(5rem, 18vw, 10rem); line-height: 1; color: var(--navy-900); opacity: 0.1; }
        .err__title { font-family: var(--font-display); font-size: clamp(1.4rem, 4vw, 2rem); color: var(--navy-900); margin-bottom: 0.5rem; }
        .err__text { color: var(--text-secondary); max-width: 460px; line-height: 1.7; margin-bottom: 2rem; }
        .err__text .de { display: block; margin-top: 0.4rem; font-size: 0.92rem; }
        .err__actions { display: flex; gap: 0.8rem; flex-wrap: wrap; justify-content: center; }
    </style>
</head>
<body>
<main class="err">
    <div class="err__code">404</div>
    <h1 class="err__title">Page not found · Seite nicht gefunden</h1>
    <p class="err__text">
        The page you're looking for doesn't exist or has moved.
        <span class="de">Die gesuchte Seite existiert nicht oder wurde verschoben.</span>
    </p>
    <div class="err__actions">
        <a href="/" class="btn btn--primary">Home</a>
        <a href="/blog/en/" class="btn btn--ghost" style="color:var(--navy-900);border-color:var(--gray-200);">Articles</a>
        <a href="/de/" class="btn btn--ghost" style="color:var(--navy-900);border-color:var(--gray-200);">Deutsch</a>
    </div>
</main>
</body>
</html>
